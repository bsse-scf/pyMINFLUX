name: Build standalone app

on:
  workflow_dispatch:
  pull_request:
  push:
    tags:
      - "*"

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/run_tests.yml

  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    name: Build apps
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            script: ./build_linux_exe_nuitka.sh
            artifact_name: pyMINFLUX-linux-x64
            archive_name: pyMINFLUX-linux-x64.zip
          - name: Windows x64
            os: windows-2025
            script: .\build_windows_exe_nuitka.cmd
            artifact_name: pyMINFLUX-windows-x64
            archive_name: pyMINFLUX-windows-x64.zip
          - name: macOS Intel
            os: macos-15-intel
            script: ./build_macos_app_nuitka.sh
            artifact_name: pyMINFLUX-macos-intel
            archive_name: pyMINFLUX-macos-intel.zip
          - name: macOS Apple Silicon
            os: macos-15
            script: ./build_macos_app_nuitka.sh
            artifact_name: pyMINFLUX-macos-arm64
            archive_name: pyMINFLUX-macos-arm64.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-python: true
          cache-dependency-glob: uv.lock

      - name: Build standalone app
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x "${{ matrix.script }}"
          "${{ matrix.script }}"

      - name: Build standalone app
        if: runner.os == 'Windows'
        shell: cmd
        run: ${{ matrix.script }}

      - name: Package standalone app
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd dist
          zip -r "${{ matrix.archive_name }}" pyMINFLUX

      - name: Package standalone app
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/pyMINFLUX -DestinationPath dist/${{ matrix.archive_name }} -Force

      - name: Package standalone app
        if: runner.os == 'macOS'
        shell: bash
        run: ditto -c -k --sequesterRsrc --keepParent dist/pyMINFLUX.app dist/${{ matrix.archive_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.archive_name }}
          if-no-files-found: error
          retention-days: 14

