name: Run tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_call:

jobs:
  test:
    name: Test on ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
          - os: macos-latest
            name: macOS (Apple Silicon)
          - os: macos-13
            name: macOS (Intel)
          - os: windows-latest
            name: Windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libglib2.0-0 libxkbcommon-x11-0 libdbus-1-3 xvfb

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: |
          xvfb-run --auto-servernum pytest test/

      - name: Run tests
        if: runner.os != 'Linux'
        run: |
          pytest test/
